services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: sris_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - sris_bigdata

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: sris_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - sris_bigdata

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: sris_kafka_init
    depends_on:
      - kafka
    command:
      - bash
      - -lc
      - |
        cub kafka-ready -b kafka:29092 1 60
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic road_reports --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic weather_data --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic traffic_data --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic news_data --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic accident_data --partitions 3 --replication-factor 1
    networks:
      - sris_bigdata

  namenode:
    image: apache/hadoop:3.4.1
    container_name: sris_hdfs_namenode
    hostname: namenode
    user: root
    ports:
      - "9870:9870"
      - "9000:9000"
    command:
      - bash
      - -lc
      - |
        if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
          hdfs namenode -format -force -nonInteractive
        fi
        hdfs namenode
    volumes:
      - namenode_data:/tmp/hadoop-root/dfs/name
      - ./bigdata/hdfs/config:/opt/hadoop/etc/hadoop:ro
    networks:
      - sris_bigdata

  datanode:
    image: apache/hadoop:3.4.1
    container_name: sris_hdfs_datanode
    hostname: datanode
    user: root
    depends_on:
      - namenode
    command: ["hdfs", "datanode"]
    volumes:
      - datanode_data:/tmp/hadoop-root/dfs/data
      - ./bigdata/hdfs/config:/opt/hadoop/etc/hadoop:ro
    networks:
      - sris_bigdata

  hdfs-init:
    image: apache/hadoop:3.4.1
    container_name: sris_hdfs_init
    user: root
    depends_on:
      - namenode
      - datanode
    command:
      - bash
      - -lc
      - |
        sleep 20
        hdfs dfs -mkdir -p /raw/news /raw/weather /raw/traffic /raw/reports
        hdfs dfs -mkdir -p /processed/news /processed/weather /processed/traffic /processed/reports
        hdfs dfs -chmod -R 777 /raw /processed
    volumes:
      - ./bigdata/hdfs/config:/opt/hadoop/etc/hadoop:ro
    networks:
      - sris_bigdata

  spark-master:
    image: apache/spark:3.5.0
    container_name: sris_spark_master
    hostname: spark-master

    environment:
      SPARK_MASTER_HOST: spark-master

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master

    ports:
      - "7077:7077"
      - "8080:8080"

    volumes:
      - ./bigdata/spark/jobs:/opt/sris/jobs

    networks:
      - sris_bigdata

  spark-worker:
    image: apache/spark:3.5.0
    container_name: sris_spark_worker
    hostname: spark-worker

    depends_on:
      - spark-master

    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077

    ports:
      - "8081:8081"

    volumes:
      - ./bigdata/spark/jobs:/opt/sris/jobs

    networks:
      - sris_bigdata

volumes:
  kafka_data:
  namenode_data:
  datanode_data:

networks:
  sris_bigdata:
    name: sris_bigdata
